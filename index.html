<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Persona - 朋友圈影音名片</title>
    <style>
        :root { --primary: #ff0000; --fb-blue: #1877F2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #1c1e21; }
        
        /* 頂部橫幅 */
        .header { background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; padding: 40px 20px; text-align: center; margin-bottom: -50px; }
        .header h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* 毛玻璃容器 */
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3); margin-bottom: 25px; }

        /* 播放器 */
        #video-player-container { display: none; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); transition: 0.5s; }
        .video-wrapper { position: relative; padding-top: 56.25%; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* 橫向滾動最愛清單 */
        .fav-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px; scrollbar-width: thin; scrollbar-color: #ddd transparent; }
        .fav-card { min-width: 200px; max-width: 200px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; position: relative; }
        .fav-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .fav-card img { width: 100%; height: 110px; object-fit: cover; }
        .fav-card-info { padding: 10px; font-size: 13px; font-weight: bold; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .remove-tag { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border-radius: 50%; width: 22px; height: 22px; text-align: center; line-height: 20px; font-size: 14px; z-index: 10; transition: 0.2s; }
        .remove-tag:hover { background: #ff0000; transform: scale(1.1); }

        /* 搜尋與操作區 */
        .search-bar { display: flex; gap: 10px; margin: 20px 0; }
        input { flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid #ddd; outline: none; transition: 0.3s; font-size: 16px; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,0,0,0.1); }
        .btn { padding: 10px 25px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-red { background: var(--primary); color: white; }
        .btn-fb { background: var(--fb-blue); color: white; width: 100%; margin-top: 10px; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }

        /* 搜尋結果樣式 */
        .search-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; gap: 15px; cursor: pointer; transition: 0.2s; }
        .search-item:hover { background: #f9f9f9; }
        .search-item img { width: 100px; border-radius: 8px; }
        .search-item-info { flex: 1; text-align: left; }
        .search-item-info strong { display: block; margin-bottom: 5px; font-size: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎵 My Favorite Media</h1>
    <p>發掘朋友的靈魂影音，增進彼此了解</p>
</div>

<div class="container">
    <div id="video-player-container">
        <div class="video-wrapper">
            <iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div class="glass-card">
        <h3 style="margin-top:0; color:var(--primary); display: flex; align-items: center; gap: 8px;">
            ❤️ Frankie 的最愛收藏
        </h3>
        <p id="status-msg" style="color:#65676b; font-size:14px; margin-top:-10px;">搜尋影片並點擊「收藏」來填滿你的名片吧！</p>
        <div class="fav-scroll" id="fav-list">
            </div>
    </div>

    <div class="glass-card">
        <div id="login-section">
            <button class="btn btn-fb" onclick="fbLogin()">以 Facebook 連結個人清單</button>
        </div>
        
        <div class="search-bar">
            <input type="text" id="query" placeholder="搜尋想分享給朋友的影片...">
            <button class="btn btn-red" onclick="searchYouTube()">搜尋影片</button>
        </div>
        <div id="results"></div>
    </div>
</div>

<script>
    const YT_API_KEY = 'AIzaSyASslL02x2kkNcCvNolXN5q-HHgIyfQqu8';
    let favorites = JSON.parse(localStorage.getItem('myFavs')) || [];

    // 初始化顯示
    displayFavorites();

    function searchYouTube() {
        const query = document.getElementById('query').value;
        if(!query) return alert('請輸入搜尋關鍵字');
        
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query)}&key=${YT_API_KEY}&type=video`;

        fetch(url).then(res => res.json()).then(data => {
            if(data.error) return alert('搜尋出錯: ' + data.error.message);
            
            let html = '';
            data.items.forEach(item => {
                const videoId = item.id.videoId;
                const title = item.snippet.title;
                const thumb = item.snippet.thumbnails.medium.url;
                
                // 為了安全傳遞標題字串，進行編碼處理
                const safeTitle = btoa(encodeURIComponent(title));

                html += `
                    <div class="search-item">
                        <img src="${thumb}" onclick="playVideo('${videoId}')">
                        <div class="search-item-info" onclick="playVideo('${videoId}')">
                            <strong>${title}</strong>
                            <small style="color:#65676b">${item.snippet.channelTitle}</small>
                        </div>
                        <button class="btn btn-red" style="padding: 6px 12px; font-size: 12px; border-radius: 8px;" 
                                onclick="addToFav('${videoId}', '${safeTitle}', '${thumb}')">收藏</button>
                    </div>`;
            });
            document.getElementById('results').innerHTML = html;
        });
    }

    function addToFav(id, titleEncoded, thumb) {
        const title = decodeURIComponent(atob(titleEncoded));
        if (favorites.find(f => f.id === id)) return alert('這部影片已經在你的收藏清單中囉！');
        
        favorites.push({ id, title, thumb });
        saveAndRefresh();
    }

    function removeFav(e, id) {
        e.stopPropagation(); // 防止刪除時觸發播放
        favorites = favorites.filter(f => f.id !== id);
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('myFavs', JSON.stringify(favorites));
        displayFavorites();
    }

    function displayFavorites() {
        let html = '';
        const favListEl = document.getElementById('fav-list');
        const statusMsgEl = document.getElementById('status-msg');

        if (favorites.length === 0) {
            favListEl.innerHTML = '<p style="color:#999; text-align:center; width:100%; padding: 20px;">目前還沒有收藏，去搜尋看看吧！</p>';
            statusMsgEl.innerText = "搜尋影片並點擊「收藏」來填滿你的名片吧！";
            return;
        }

        favorites.forEach(f => {
            html += `
                <div class="fav-card" onclick="playVideo('${f.id}')">
                    <div class="remove-tag" onclick="removeFav(event, '${f.id}')">×</div>
                    <img src="${f.thumb}">
                    <div class="fav-card-info">${f.title}</div>
                </div>`;
        });
        favListEl.innerHTML = html;
        statusMsgEl.innerText = "點擊卡片即可播放影片";
    }

    function playVideo(videoId) {
        const playerContainer = document.getElementById('video-player-container');
        const playerFrame = document.getElementById('main-player');
        
        playerContainer.style.display = 'block';
        playerFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
        
        // 平滑滾動到播放器位置
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function fbLogin() {
        alert('這將會連結您的 Facebook API，目前為開發者測試模式。');
    }
</script>

</body>
</html>
