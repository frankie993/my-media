<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Media Persona - 社交挖掘版</title>
    <style>
        :root { --primary: #ff4757; --fb-blue: #1877F2; --bg: #f1f2f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #2f3542; -webkit-tap-highlight-color: transparent; }
        .header { background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; padding: 40px 20px; text-align: center; margin-bottom: -40px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 25px; border: 1px solid #fff; }
        
        /* 播放器 */
        #player-box { display: none; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .video-wrapper { position: relative; padding-top: 56.25%; }
        .video-wrapper iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:none; }

        /* 清單滾動 */
        .scroll-area { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; -webkit-overflow-scrolling: touch; }
        .video-card { min-width: 160px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .video-card img { width: 100%; height: 90px; object-fit: cover; }
        .video-card-title { padding: 8px; font-size: 11px; font-weight: bold; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* 綠色大按鈕 */
        .btn-green { background: #2ed573; color: white; padding: 16px; border-radius: 35px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 17px; margin-top: 10px; box-shadow: 0 6px 15px rgba(46,213,115,0.3); transition: 0.2s; }
        .btn-green:active { transform: scale(0.96); background: #26af5f; }

        .search-row { display: flex; gap: 8px; margin: 15px 0; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        .btn-search { background: var(--primary); color: white; padding: 10px 18px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; }
        
        /* 歷史紀錄 */
        .history-section { border-top: 1px solid #eee; margin-top: 15px; padding-top: 15px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; }
        .history-link { color: var(--fb-blue); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎵 My Favorite Media</h1>
    <p>發掘朋友的靈魂影音</p>
</div>

<div class="container">
    <div id="player-box">
        <div class="video-wrapper"><iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
    </div>

    <div class="glass-card">
        <h3 id="list-title" style="margin-top:0; font-size: 18px;">❤️ 影音最愛清單</h3>
        <div class="scroll-area" id="fav-display"></div>
        <button class="btn-green" onclick="finalShare()">🚀 一鍵分享到 Facebook</button>
        
        <div class="history-section" id="history-box" style="display:none;">
            <p style="margin:0 0 10px 0; font-size: 12px; color: #888; font-weight: bold;">🕒 最近看過的朋友紀錄</p>
            <div id="history-list"></div>
        </div>
    </div>

    <div class="glass-card">
        <div class="search-row">
            <input type="text" id="keyword" placeholder="搜尋影片加入收藏...">
            <button class="btn-search" onclick="doSearch()">搜尋</button>
        </div>
        <div id="search-results" style="max-height: 300px; overflow-y: auto;"></div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyASslL02x2kkNcCvNolXN5q-HHgIyfQqu8';
    let myFavs = [];

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const vIds = params.get('v');
        if (vIds) {
            document.getElementById('list-title').innerText = "❤️ 朋友分享的清單";
            const ids = vIds.split(',');
            myFavs = ids.map(id => ({id, title: '推薦影片', thumb: `https://i.ytimg.com/vi/${id}/mqdefault.jpg`}));
            saveToHistory(window.location.href);
        } else {
            myFavs = JSON.parse(localStorage.getItem('myMediaFavs')) || [];
        }
        renderFavs();
        renderHistory();
    };

    function doSearch() {
        const q = document.getElementById('keyword').value;
        if(!q) return;
        fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(q)}&key=${API_KEY}&type=video`)
        .then(r => r.json()).then(data => {
            let h = '';
            data.items.forEach(i => {
                const vid = i.id.videoId;
                const tit = i.snippet.title;
                const thm = i.snippet.thumbnails.default.url;
                h += `<div style="display:flex; align-items:center; gap:10px; margin-bottom:12px; cursor:pointer;" onclick="play('${vid}')">
                    <img src="${thm}" style="width:70px; border-radius:6px;">
                    <div style="flex:1; font-size:13px; font-weight:500;">${tit}</div>
                    <button onclick="event.stopPropagation(); add('${vid}','${btoa(encodeURIComponent(tit))}','${thm}')" style="border:none; background:var(--primary); color:#fff; padding:6px 12px; border-radius:15px; font-size:11px;">收藏</button>
                </div>`;
            });
            document.getElementById('search-results').innerHTML = h;
        });
    }

    function add(id, tEnc, thumb) {
        const title = decodeURIComponent(atob(tEnc));
        if(myFavs.find(x => x.id === id)) return alert('已在收藏中');
        myFavs.push({id, title, thumb});
        localStorage.setItem('myMediaFavs', JSON.stringify(myFavs));
        renderFavs();
    }

    function renderFavs() {
        let h = '';
        myFavs.forEach(x => {
            h += `<div class="video-card" onclick="play('${x.id}')">
                <img src="${x.thumb}"><div class="video-card-title">${x.title}</div>
            </div>`;
        });
        document.getElementById('fav-display').innerHTML = h || '<p style="color:#999; font-size:13px;">目前沒有收藏，請搜尋影片</p>';
    }

    function play(id) {
        document.getElementById('player-box').style.display = 'block';
        document.getElementById('main-player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        window.scrollTo({top:0, behavior:'smooth'});
    }

    // --- 終極分享邏輯 ---
    function finalShare() {
        if(myFavs.length === 0) return alert('請先收藏影片');
        
        const ids = myFavs.map(x => x.id).join(',');
        const link = window.location.origin + window.location.pathname + '?v=' + ids;
        
        // 1. 強制執行自動複製
        const el = document.createElement('textarea');
        el.value = link;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);

        // 2. 使用 m.facebook.com 強制開啟 Web 分享，防止被 App 攔截
        const fbUrl = "https://m.facebook.com/sharer.php?u=" + encodeURIComponent(link);
        
        alert('✅ 分享連結已備好！\n\n按確定後會跳轉 Facebook，請直接點擊「發佈」。\n(若發文框為空，請長按貼上連結)');
        
        window.location.href = fbUrl;
    }

    // 歷史紀錄
    function saveToHistory(url) {
        let h = JSON.parse(localStorage.getItem('mediaHistory')) || [];
        if(!h.includes(url)) {
            h.unshift(url);
            if(h.length > 5) h.pop();
            localStorage.setItem('mediaHistory', JSON.stringify(h));
        }
    }

    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('mediaHistory')) || [];
        if(h.length === 0) return;
        document.getElementById('history-box').style.display = 'block';
        let html = '';
        h.forEach((url, i) => {
            html += `<div class="history-item">
                <span>朋友的清單 ${i+1}</span>
                <a class="history-link" href="${url}">查看</a>
            </div>`;
        });
        document.getElementById('history-list').innerHTML = html;
    }
</script>
</body>
</html>
