<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Persona - 一鍵直發版</title>
    <style>
        :root { --primary: #ff4757; --fb-blue: #1877F2; --bg: #f1f2f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #2f3542; }
        .header { background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; padding: 50px 20px; text-align: center; margin-bottom: -40px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 25px; border: 1px solid #fff; }
        
        /* 播放器 */
        #player-box { display: none; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .video-wrapper { position: relative; padding-top: 56.25%; }
        .video-wrapper iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:none; }

        /* 清單滾動 */
        .scroll-area { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; }
        .video-card { min-width: 180px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .video-card img { width: 100%; height: 100px; object-fit: cover; }
        .video-card-title { padding: 8px; font-size: 12px; font-weight: bold; height: 34px; overflow: hidden; }

        /* 綠色大按鈕 */
        .btn-green { background: #2ed573; color: white; padding: 18px; border-radius: 35px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 6px 20px rgba(46,213,115,0.4); transition: 0.3s; }
        .btn-green:active { transform: scale(0.98); }

        .search-row { display: flex; gap: 10px; margin: 15px 0; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        .btn-search { background: var(--primary); color: white; padding: 10px 20px; border-radius: 25px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="fb-root"></div>
<script async defer crossorigin="anonymous" src="https://connect.facebook.net/zh_HK/sdk.js#xfbml=1&version=v18.0"></script>

<div class="header">
    <h1>🎵 My Favorite Media</h1>
    <p>選好最愛，一鍵分享至 Facebook</p>
</div>

<div class="container">
    <div id="player-box">
        <div class="video-wrapper"><iframe id="main-player" src="" allowfullscreen></iframe></div>
    </div>

    <div class="glass-card">
        <h3 id="list-title" style="margin-top:0; color:var(--fb-blue);">❤️ 當前影音清單</h3>
        <div class="scroll-area" id="fav-display"></div>
        <button class="btn-green" onclick="directShare()">🚀 立即發佈到 Facebook</button>
        <p style="text-align:center; font-size:12px; color:#666; margin-top:8px;">按下後請在彈出的 FB 視窗點擊「發佈」</p>
    </div>

    <div class="glass-card">
        <div class="search-row">
            <input type="text" id="keyword" placeholder="搜尋 YouTube 影片加入收藏...">
            <button class="btn-search" onclick="doSearch()">搜尋</button>
        </div>
        <div id="search-results"></div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyASslL02x2kkNcCvNolXN5q-HHgIyfQqu8';
    let myFavs = [];

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const vIds = params.get('v');
        if (vIds) {
            document.getElementById('list-title').innerText = "❤️ 朋友分享的清單";
            const ids = vIds.split(',');
            myFavs = ids.map(id => ({id, title: '推薦影片', thumb: `https://i.ytimg.com/vi/${id}/mqdefault.jpg`}));
        } else {
            myFavs = JSON.parse(localStorage.getItem('myMediaFavs')) || [];
        }
        renderFavs();
    };

    function doSearch() {
        const q = document.getElementById('keyword').value;
        if(!q) return;
        fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(q)}&key=${API_KEY}&type=video`)
        .then(r => r.json()).then(data => {
            let h = '';
            data.items.forEach(i => {
                h += `<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer;" onclick="play('${i.id.videoId}')">
                    <img src="${i.snippet.thumbnails.default.url}" style="width:80px; border-radius:8px;">
                    <div style="flex:1; font-size:13px;">${i.snippet.title}</div>
                    <button onclick="event.stopPropagation(); add('${i.id.videoId}','${btoa(encodeURIComponent(i.snippet.title))}','${i.snippet.thumbnails.default.url}')" style="border:none; background:#ff4757; color:#fff; padding:5px 12px; border-radius:15px; font-size:11px; font-weight:bold;">收藏</button>
                </div>`;
            });
            document.getElementById('search-results').innerHTML = h;
        });
    }

    function add(id, tEnc, thumb) {
        const title = decodeURIComponent(atob(tEnc));
        if(myFavs.find(x => x.id === id)) return alert('已在收藏中');
        myFavs.push({id, title, thumb});
        localStorage.setItem('myMediaFavs', JSON.stringify(myFavs));
        renderFavs();
    }

    function renderFavs() {
        let h = '';
        myFavs.forEach(x => {
            h += `<div class="video-card" onclick="play('${x.id}')">
                <img src="${x.thumb}"><div class="video-card-title">${x.title}</div>
            </div>`;
        });
        document.getElementById('fav-display').innerHTML = h || '<p style="color:#999; text-align:center; width:100%;">目前沒有收藏</p>';
    }

    function play(id) {
        document.getElementById('player-box').style.display = 'block';
        document.getElementById('main-player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        window.scrollTo({top:0, behavior:'smooth'});
    }

    // --- 改良版：強制 Facebook 自動填入連結 ---
    function directShare() {
        if(myFavs.length === 0) return alert('請先收藏影片再分享');
        
        const ids = myFavs.map(x => x.id).join(',');
        const link = window.location.origin + window.location.pathname + '?v=' + ids;
        
        // 1. 自動複製連結 (作為備案)
        navigator.clipboard.writeText(link);

        // 2. 呼叫 Facebook Sharer 並強制帶入 URL 參數
        const fbUrl = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(link);
        
        // 3. 在手機上使用全螢幕跳轉，在電腦上使用視窗
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) {
            window.location.href = fbUrl; // 手機上直接跳轉最穩定
        } else {
            window.open(fbUrl, 'fb-share', 'width=600,height=500');
        }
    }
</script>
</body>
</html>
