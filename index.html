<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Persona - 社交分享版</title>
    <style>
        :root { --primary: #ff0000; --fb-blue: #1877F2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #1c1e21; }
        .header { background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; padding: 40px 20px; text-align: center; margin-bottom: -50px; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3); margin-bottom: 25px; }
        
        /* 播放器 */
        #video-player-container { display: none; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .video-wrapper { position: relative; padding-top: 56.25%; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* 橫向滾動 */
        .fav-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px; }
        .fav-card { min-width: 200px; max-width: 200px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; position: relative; }
        .fav-card img { width: 100%; height: 110px; object-fit: cover; }
        .fav-card-info { padding: 10px; font-size: 13px; font-weight: bold; height: 40px; overflow: hidden; }

        /* 分享按鈕 */
        .share-section { text-align: center; margin-top: 15px; }
        .btn-share { background: #28a745; color: white; padding: 12px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* 搜尋樣式 */
        .search-bar { display: flex; gap: 10px; margin: 20px 0; }
        input { flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid #ddd; outline: none; }
        .btn-red { background: var(--primary); color: white; padding: 10px 25px; border-radius: 30px; border: none; cursor: pointer; }
        .search-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; gap: 15px; cursor: pointer; }
        .search-item img { width: 100px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎵 My Favorite Media</h1>
    <p>發掘朋友的靈魂影音</p>
</div>

<div class="container">
    <div id="video-player-container">
        <div class="video-wrapper"><iframe id="main-player" src="" allow="autoplay" allowfullscreen></iframe></div>
    </div>

    <div class="glass-card">
        <h3 id="owner-title">❤️ 影音最愛清單</h3>
        <div class="fav-scroll" id="fav-list"></div>
        
        <div class="share-section">
            <button class="btn-share" onclick="generateShareLink()">📤 產生我的專屬分享連結</button>
            <p id="share-url-hint" style="font-size: 12px; color: #28a745; display: none; margin-top: 10px;">連結已複製！快去貼到 Facebook 吧！</p>
        </div>
    </div>

    <div class="glass-card">
        <div class="search-bar">
            <input type="text" id="query" placeholder="搜尋新影片加入清單...">
            <button class="btn-red" onclick="searchYouTube()">搜尋</button>
        </div>
        <div id="results"></div>
    </div>
</div>

<script>
    const YT_API_KEY = 'AIzaSyASslL02x2kkNcCvNolXN5q-HHgIyfQqu8';
    let favorites = [];

    // --- 核心邏輯：讀取網址參數 ---
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const videoIds = urlParams.get('v');
        
        if (videoIds) {
            document.getElementById('owner-title').innerText = "❤️ 朋友分享給你的清單";
            // 根據網址裡的 ID 去抓取影片資訊 (這裡簡化處理，直接顯示)
            const ids = videoIds.split(',');
            ids.forEach(id => {
                // 這裡暫時用 ID 當標題，實務上可再呼叫 API 抓正確標題
                favorites.push({ id: id, title: '分享影片', thumb: `https://i.ytimg.com/vi/${id}/mqdefault.jpg` });
            });
            displayFavorites();
        } else {
            // 如果沒參數，就讀本地儲存
            favorites = JSON.parse(localStorage.getItem('myFavs')) || [];
            displayFavorites();
        }
    };

    function searchYouTube() {
        const query = document.getElementById('query').value;
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query)}&key=${YT_API_KEY}&type=video`;
        fetch(url).then(res => res.json()).then(data => {
            let html = '';
            data.items.forEach(item => {
                const videoId = item.id.videoId;
                html += `
                    <div class="search-item" onclick="playVideo('${videoId}')">
                        <img src="${item.snippet.thumbnails.medium.url}">
                        <div style="flex:1"><strong>${item.snippet.title}</strong></div>
                        <button class="btn-red" style="padding:5px 10px" onclick="event.stopPropagation(); addToFav('${videoId}','${item.snippet.title}','${item.snippet.thumbnails.medium.url}')">收藏</button>
                    </div>`;
            });
            document.getElementById('results').innerHTML = html;
        });
    }

    function addToFav(id, title, thumb) {
        if (favorites.find(f => f.id === id)) return;
        favorites.push({ id, title, thumb });
        localStorage.setItem('myFavs', JSON.stringify(favorites));
        displayFavorites();
    }

    function displayFavorites() {
        let html = '';
        favorites.forEach(f => {
            html += `<div class="fav-card" onclick="playVideo('${f.id}')">
                <img src="${f.thumb}"><div class="fav-card-info">${f.title}</div>
            </div>`;
        });
        document.getElementById('fav-list').innerHTML = html || '<p>目前清單是空的</p>';
    }

    function playVideo(id) {
        document.getElementById('video-player-container').style.display = 'block';
        document.getElementById('main-player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- 核心邏輯：產生分享連結 ---
    function generateShareLink() {
        const ids = favorites.map(f => f.id).join(',');
        const shareUrl = window.location.origin + window.location.pathname + '?v=' + ids;
        
        // 複製到剪貼簿
        navigator.clipboard.writeText(shareUrl).then(() => {
            document.getElementById('share-url-hint').style.display = 'block';
            setTimeout(() => { document.getElementById('share-url-hint').style.display = 'none'; }, 3000);
        });
    }
</script>
</body>
</html>
